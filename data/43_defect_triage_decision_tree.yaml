triage:
  blocker:
    conditions:
      - "核心主流程无法执行"
      - "生产环境存在数据损坏风险"
      - "无临时绕过方案"
    action: "立即阻断发布并升级到项目负责人"
  critical:
    conditions:
      - "高频用户路径严重受损"
      - "存在明显安全或权限泄露风险"
    action: "进入当期修复清单，要求补充回归范围"
  major:
    conditions:
      - "功能可用但结果错误"
      - "存在可接受但不稳定的绕过方案"
    action: "评估版本窗口与修复成本后排期"
  minor:
    conditions:
      - "低频路径体验问题"
      - "文案、布局、提示信息偏差"
    action: "进入体验优化或后续迭代"
